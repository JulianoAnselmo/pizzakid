name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Monta a pasta `public/` apenas com os arquivos que devem ir ao ar.
      - name: Prepare publish directory
        run: |
          mkdir -p public/assets public/data public/styles public/scripts
          cp index.html public/
          cp 404.html public/
          cp privacidade.html public/
          cp manifest.webmanifest public/
          cp robots.txt public/
          cp sitemap.xml public/
          [ -f CNAME ] && cp CNAME public/ || true
          cp -r assets/. public/assets/
          cp -r data/. public/data/
          cp -r styles/. public/styles/
          cp scripts/main.js public/scripts/
          # Sanity check — não deve existir nada de dev no resultado
          ! ls public/*.md 2>/dev/null
          ! ls public/test-*.html 2>/dev/null
          echo "--- conteúdo de public/ ---"
          ls -la public/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
